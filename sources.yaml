# ─── Trading Alpha Engine — ingestion targets ──────────────────────────────────
# Edit this file to retarget the engine. No code changes required.
# All feeds/repos below were verified reachable. Add your own freely.

github:
  # What to pull from each repo: any of [commits, releases]
  # Curated to a few FLAGSHIP, mainstream-popular trading projects (the source itself is the
  # topic filter here — every commit/release is on-brand). Add more freely.
  track: [commits, releases]
  repos:
    - freqtrade/freqtrade                 # most-popular open-source trading bot
    - QuantConnect/Lean                   # mainstream algo/backtesting engine
    - OpenBB-finance/OpenBB               # popular open research/data platform
    - polakowo/vectorbt                   # widely-used backtesting/research library
    - nautechsystems/nautilus_trader      # production-grade live trading platform

reddit:
  # Credential-free: pulled via Reddit's public subreddit RSS (no OAuth/app needed).
  # COMMUNITY-stream source (discussion), held to a lower relevance bar. Kept to the most
  # active, mainstream algo/markets communities + the two biggest India trading subs.
  subreddits:
    - algotrading
    - quant
    - IndianStreetBets
    - IndianStockMarket
  listing: top          # top | hot | new
  time_filter: week     # for "top": hour | day | week | month | year | all
  min_score: 0          # (only applies to the optional PRAW path; RSS has no score)

rss:
  # MAINSTREAM-LED backbone. Broad news feeds carry an ingest `screen:` so only on-topic
  # items reach the LLM: `screen: ai` (financial media → keep AI/automation-in-trading items)
  # or `screen: markets` (tech media → keep trading/finance items). Screen keyword groups are
  # defined at the bottom of this block; flagship platform feeds run unscreened (already on-topic).
  feeds:
    # ── Mainstream financial media (screen: ai) — mostly India-tagged by the LLM ──
    - name: "Economic Times Markets"
      url: "https://economictimes.indiatimes.com/markets/rssfeeds/1977021501.cms"
      screen: ai
    - name: "Livemint Markets"
      url: "https://www.livemint.com/rss/markets"
      screen: ai
    - name: "CNBC Investing"
      url: "https://search.cnbc.com/rss/2.0/id/15839135/device/rss/rss.html"
      screen: ai
    # ── Mainstream tech / fintech media (screen: markets) ──
    - name: "TechCrunch Fintech"
      url: "https://techcrunch.com/category/fintech/feed/"
      screen: markets
    - name: "VentureBeat AI"
      url: "https://venturebeat.com/category/ai/feed/"
      screen: markets
    - name: "Inc42 Fintech"
      url: "https://inc42.com/industry/fintech/feed/"
      screen: markets
    # ── Flagship platforms / high-signal (no screen — already on-topic) ──
    - name: "Zerodha Z-Connect"
      url: "https://zerodha.com/z-connect/feed"
    - name: "QuantInsti"
      url: "https://blog.quantinsti.com/feed/"
    - name: "Alpaca Markets"
      url: "https://alpaca.markets/blog/feed"
    # Query-filtered at the source by topic — high signal, no screen needed.
    - name: "Hacker News: algorithmic trading"
      url: "https://hnrss.org/newest?q=algorithmic%20trading"
    - name: "Hacker News: quant"
      url: "https://hnrss.org/newest?q=quant%20finance"
    # ── Capital-markets & trading trade press — launches + funding (screen: markets) ──
    # (The TRADE / thetradenews.com omitted — its /feed/ returns no parseable entries. Finextra
    # Markets + Crunchbase News verified live. Add more capital-markets feeds the same way.)
    - name: "Finextra Markets"
      url: "https://www.finextra.com/rss/channel.aspx?channel=markets"
      screen: markets
    - name: "Crunchbase News"
      url: "https://news.crunchbase.com/feed/"
      screen: markets

  # Ingest screen keyword groups. Matched case-insensitively as whole WORDS (word boundaries),
  # so short tokens like "ai"/"nse" don't match inside "retail"/"sense". Include plural forms
  # ("stock" won't match "stocks"). Edit freely; an empty group disables that screen mode.
  screen_keywords_ai:
    - ai
    - artificial intelligence
    - machine learning
    - ml
    - deep learning
    - neural
    - llm
    - llms
    - gpt
    - generative
    - algorithm
    - algorithms
    - algorithmic
    - algo
    - algos
    - automation
    - automated
    - bot
    - bots
    - agent
    - agents
    - agentic
    - copilot
    - quant
    - quantitative
    - predictive
    - data-driven
  screen_keywords_markets:
    - trading
    - trade
    - trades
    - trader
    - traders
    - market
    - markets
    - stock
    - stocks
    - equity
    - equities
    - share
    - shares
    - option
    - options
    - futures
    - forex
    - fx
    - portfolio
    - portfolios
    - broker
    - brokers
    - brokerage
    - exchange
    - exchanges
    - investing
    - investment
    - investments
    - investor
    - investors
    - derivative
    - derivatives
    - etf
    - etfs
    - alpha
    - backtest
    - hedge fund
    - crypto
    - nifty
    - sensex
    - nse
    - bse
    - sebi
    - zerodha
    - upstox

forums:
  # COMMUNITY-stream source. QuantConnect has a dedicated scraper (newest threads via
  # last-page discovery); any other forum here uses a generic RSS-then-HTML fallback.
  # A source that fails to parse is skipped, not fatal.
  # NOTE: Freqtrade was removed — its GitHub Discussions are disabled and its community is
  # Discord-gated (no free API). Freqtrade/crypto discussion is covered via r/algotrading,
  # and its engineering via the freqtrade release feed + GitHub commits.
  - name: "QuantConnect Community"
    type: html
    url: "https://www.quantconnect.com/forum/discussions"

mcp:
  # DISABLED (resource reduction): the 10-query GitHub-search discovery firehose was mostly
  # noise. Leave github_search_queries empty and build_sources skips the adapter. Re-add
  # queries here to turn MCP-server discovery back on.
  github_search_queries: []

bluesky:
  # DISABLED (resource reduction): low signal-to-noise community firehose. Set enabled: true
  # (and re-add queries) to turn back on.
  enabled: false
  queries:
    - "algorithmic trading"

numerai:
  # DISABLED (resource reduction): niche tournament source. Set enabled: true to turn back on.
  enabled: false
  forum_url: "https://forum.numer.ai"
  api_url: "https://api-tournament.numer.ai"
  leaderboard_size: 5

stocktwits:
  # Optional Firestream integration. Enable only with provisioned environment credentials.
  enabled: false
  symbols: [SPY, QQQ, NVDA, BTC]
  max_messages: 25
  poll_seconds: 10

twitter:
  # Stubbed. Adapter stays disabled unless TWITTER_ENABLED=true AND a bearer token is set.
  enabled: false
  handles:
    # - some_builder
    # - another_quant_dev

careers:
  # ALPHA-stream source. Public applicant-tracking-system job boards for top quant / HFT firms —
  # what they're building and hiring for. Each posting is scored by the LLM under the
  # "Quant Firms" category (routine listings are filtered; team build-outs / tech-stack signals
  # survive). `ats` is one of greenhouse | lever | ashby; `token` is the firm's public board slug.
  # Tokens below were verified live (2026-07); add lever/ashby firms the same way.
  # Mainstream quant/HFT firms (global) + India quant/HFT firms. `token` is the firm's public
  # ATS board slug. India firms feed the /jobs + /india tabs; the LLM region-tags by job location.
  # Graviton & AlphaGrep are Greenhouse-confirmed; the other India firms are best-effort — verify
  # each with `ingest-only -s careers` and drop any that 404 or use a non-ATS careers page.
  enabled: true
  firms:
    # Global
    - { firm: "Jane Street", ats: greenhouse, token: janestreet }
    - { firm: "Jump Trading", ats: greenhouse, token: jumptrading }
    - { firm: "DRW", ats: greenhouse, token: drweng }
    - { firm: "IMC Trading", ats: greenhouse, token: imc }
    - { firm: "Tower Research Capital", ats: greenhouse, token: towerresearchcapital }
    - { firm: "Point72 / Cubist", ats: greenhouse, token: point72 }
    # India-heavy (verified live on Greenhouse — Graviton lists Gurugram/Gandhinagar roles,
    # WorldQuant has Bengaluru/Mumbai offices; the LLM region-tags by each posting's location).
    - { firm: "Graviton Research Capital", ats: greenhouse, token: gravitonresearchcapital }
    - { firm: "AlphaGrep Securities", ats: greenhouse, token: alphagrepsecurities }
    - { firm: "WorldQuant", ats: greenhouse, token: worldquant }
    # NOTE: Quadeye removed — no public Greenhouse board (404). Re-add if it exposes an ATS feed.
